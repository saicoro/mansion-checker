name: 31sumai Monitor

on:
  schedule:
    # 毎日 日本時間 09:00 〜 24:00 (3分おき)
    # 日本時間 09:00-24:00 は UTC 00:00-15:00 に相当します
    # 5番目の項目を '*' にすることで「毎日」実行されます
    - cron: '*/3 0-14 * * *'
  
  workflow_dispatch: # 手動実行用ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium

      - name: Run script
        env:
          LINE_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: python monitor.py
