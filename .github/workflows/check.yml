name: Run monitor

on:
  # iPhoneのショートカット（外部）からの呼び出しを許可
  workflow_dispatch:
  # 定期実行（予備：1時間おきに自動実行する設定）
  schedule:
    - cron: '0 * * * *'

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    # 複数物件を回るため、タイムアウトを少し長めの10分に設定（安全策）
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          # Playwrightのブラウザ（Chromium）をインストール
          python -m playwright install chromium

      - name: Run monitor script
        # GitHubのSecretsに登録した値をプログラムに渡す設定
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }} # ←これが必要です
        run: python monitor.py
